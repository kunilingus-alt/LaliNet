<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LaliNet 💜</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем бесплатное облако для чата -->
    <script src="https://pubnub.com"></script>
</head>
<body>

    <div class="app-container">
        
        <!-- 📞 ЭКРАН ЗВОНКА -->
        <div class="call-overlay" id="callWindow">
            <div class="call-avatar" id="callAvatar">ЛА</div>
            <h2 id="callName">Лалина ✨</h2>
            <div class="call-status" id="callStatus">Звонок...</div>
            
            <div class="call-buttons">
                <button class="circle-btn btn-mute" id="muteBtn" onclick="toggleMute()">🎙️</button>
                <button class="circle-btn btn-end" onclick="endCall()">🛑</button>
            </div>
        </div>
        
        <!-- 💬 БОКОВАЯ ПАНЕЛЬ -->
        <div class="sidebar">
            <div class="sidebar-header" style="color: #a855f7; text-shadow: 0 0 20px rgba(168, 85, 247, 0.6); font-family: sans-serif;">LaliNet</div>
            <div class="chat-list">
                <div class="chat-item active">
                    <div class="avatar" style="background: linear-gradient(45deg, #a855f7, #ec4899);">ЛА</div>
                    <div class="chat-info">
                        <h4>Лалина ✨</h4>
                        <p>Облачный протокол LaliNet...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ✉️ ОКНО ПЕРЕПИСКИ -->
        <div class="chat-window">
            <div class="chat-header">
                <div>
                    <h3 id="active-chat-name">Лалина ✨</h3>
                    <p style="font-size: 12px; color: #2ed573;">в сети</p>
                </div>
                <div class="call-actions">
                    <button onclick="startCall('audio')">📞 Звонок</button>
                    <button onclick="startCall('video')">📹 Видео</button>
                </div>
            </div>

            <!-- Контейнер для сообщений -->
            <div class="messages-container" id="messagesBox">
                <div class="message incoming">Добро пожаловать в глобальный LaliNet! Мы в облаке 💜</div>
            </div>

            <!-- Панель ввода -->
            <div class="input-panel">
                <button class="star-btn" onclick="sendTelegramStar()">⭐</button> 
                <input type="text" id="messageInput" placeholder="Написать Лалине...">
                <button class="send-btn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>

    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
